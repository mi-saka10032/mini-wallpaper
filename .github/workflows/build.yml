name: Build & Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Checkout source code
  # ─────────────────────────────────────────────
  checkout:
    name: 📥 Checkout
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: source
          path: .
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 2: Setup frontend & install dependencies
  # ─────────────────────────────────────────────
  setup-frontend:
    name: 🌐 Frontend Setup
    runs-on: windows-latest
    needs: checkout
    steps:
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: source

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install frontend dependencies
        run: pnpm install

      - name: Upload workspace with node_modules
        uses: actions/upload-artifact@v4
        with:
          name: frontend-workspace
          path: .
          retention-days: 1

  # ─────────────────────────────────────────────
  # Job 3: Setup Rust toolchain & cache
  # ─────────────────────────────────────────────
  setup-rust:
    name: 🦀 Rust Setup
    runs-on: windows-latest
    needs: checkout
    steps:
      - name: Download source
        uses: actions/download-artifact@v4
        with:
          name: source

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Pre-fetch Rust dependencies
        run: cargo fetch
        working-directory: src-tauri

  # ─────────────────────────────────────────────
  # Job 4: Build Tauri application & Release
  # ─────────────────────────────────────────────
  build:
    name: 🔨 Build & Release
    runs-on: windows-latest
    needs: [setup-frontend, setup-rust]
    steps:
      - name: Download frontend workspace
        uses: actions/download-artifact@v4
        with:
          name: frontend-workspace

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest
          run_install: false

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Mini Wallpaper ${{ github.ref_name }}"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
